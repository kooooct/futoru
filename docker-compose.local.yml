services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx300m
      - DB_URL=jdbc:mysql://futoru-db:3306/futoru_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8
      - DB_USER=user
      - DB_PASSWORD=password
    depends_on:
      futoru-db:
        condition: service_healthy

  futoru-db:
    image: mysql:8.0
    container_name: futoru-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: futoru_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root_password
      TZ: Asia/Tokyo
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password" ]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  default:
    name: web-network
    external: true