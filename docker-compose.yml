services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: futoru-backend
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx300m
      - DB_URL=jdbc:mysql://db:3306/futoru_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8
      - DB_USER=user
      - DB_PASSWORD=password
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: futoru-db
    environment:
      MYSQL_DATABASE: futoru_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root_password
      TZ: Asia/Tokyo
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql

networks:
  default:
    name: web-network
    external: true

volumes:
  db_data: